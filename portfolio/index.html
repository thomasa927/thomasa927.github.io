  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #000;
    }

    /* dark overlay so text and cards stay readable */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.55);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 40px 60px;
    }

    h1 {
      font-size: 1.6em;
      font-weight: bold;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    h1 em {
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 24px;
    }

    .grid a {
      display: block;
      text-decoration: none;
      color: #000;
    }

    .grid a:hover .thumb {
      opacity: 0.82;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      display: block;
      border: 1px solid #000;
      /* slight card backing so thumbnails pop off the photo */
      background: #fff;
    }

    .label {
      margin-top: 5px;
      font-size: 0.78em;
      line-height: 1.3;
      /* subtle text shadow so label is legible over background */
      text-shadow: 0 0 6px rgba(255,255,255,0.9);
    }
  </style>
</head>
