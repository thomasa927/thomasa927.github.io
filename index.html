<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARTG 2262 Homework</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #000;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.52);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 40px 60px;
    }

    h1 {
      font-size: 1.6em;
      font-weight: bold;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    h1 em {
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 24px;
    }

    .grid a {
      display: block;
      text-decoration: none;
      color: #000;
    }

    .grid a:hover .thumb {
      opacity: 0.82;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      display: block;
      border: 1px solid #000;
      object-fit: cover;
      background: #fff;
    }

    .label {
      margin-top: 5px;
      font-size: 0.78em;
      line-height: 1.3;
      text-shadow: 0 0 6px rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
<div class="page">

  <h1>Thomas Aabo's <em>ARTG 2262: Prototyping with Code</em> homework!</h1>

  <div class="grid">

    <!-- Assignment 1 -->
    <a href="https://studio.code.org/c/2768872027" target="_blank" rel="noopener">
      <img class="thumb" src="thumb1.png" alt="Assignment 1 – Frozen"/>
      <div class="label">Assignment[1] = Frozen (Hour of Code)</div>
    </a>

    <!-- Assignment 2 -->
    <a href="hw2/index.html">
      <img class="thumb" src="thumb2.png" alt="Assignment 2 – Build a Rocket"/>
      <div class="label">Assignment[2] = Build a Rocket</div>
    </a>

    <!-- Assignment 3 -->
    <a href="hw3/index.html">
      <img class="thumb" src="thumb3.png" alt="Assignment 3 – Self Portrait"/>
      <div class="label">Assignment[3] = Self Portrait</div>
    </a>

    <!-- Assignment 4 -->
    <a href="hw4/index.html">
      <img class="thumb" src="thumb4.png" alt="Assignment 4 – Metro Pattern"/>
      <div class="label">Assignment[4] = Metro Line Pattern</div>
    </a>

    <!-- Assignment 5 -->
    <a href="hw5/index.html">
      <img class="thumb" src="thumb5.png" alt="Assignment 5 – Bubble Screensaver"/>
      <div class="label">Assignment[5] = Bubble Screensaver</div>
    </a>

    <!-- Assignment 6 -->
    <a href="hw6/index.html">
      <img class="thumb" src="thumb6.png" alt="Assignment 6 – Drawing App"/>
      <div class="label">Assignment[6] = Drawing App</div>
    </a>

  </div>
</div>
</body>
</html>
